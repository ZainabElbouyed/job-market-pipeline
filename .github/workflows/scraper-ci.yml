name: Job Market Scraper CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Test with pytest
      run: |
        pytest tests/ --cov=./ --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/Dockerfile  
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/job-market-pipeline:latest
  
  deploy-pages:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Start Pushgateway (for metrics)
      run: |
        docker run -d -p 9091:9091 --name pushgateway prom/pushgateway
        sleep 5
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Generate visualizations
      run: |
        python scripts/run_pipeline.py --pages 1 --visuals || \
        python scripts/run_pipeline.py --no-scrape --visuals
    
    - name: Prepare for GitHub Pages
      run: |
        mkdir -p docs
        if [ -d "visualization/outputs" ]; then
          cp visualization/outputs/*.png docs/ 2>/dev/null || true
        fi
        cp README.md docs/index.md
        echo "<html><head><title>Job Market Dashboard</title>" > docs/index.html
        echo "<style>body{font-family:Arial;margin:40px;background:#f5f5f5;}</style>" >> docs/index.html
        echo "</head><body>" >> docs/index.html
        echo "<h1>📊 Job Market Dashboard - Maroc</h1>" >> docs/index.html
        for img in docs/*.png; do
          name=$(basename "$img" .png)
          echo "<h2>${name//_/ }</h2>" >> docs/index.html
          echo "<img src='$(basename $img)' width='900' style='border-radius:10px;box-shadow:0 4px 8px rgba(0,0,0,0.1);'><br><br>" >> docs/index.html
        done
        echo "</body></html>" >> docs/index.html
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs