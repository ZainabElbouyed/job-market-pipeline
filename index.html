<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Job Market Dashboard - Maroc</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
        }
        .dashboard-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .dashboard-item:hover {
            transform: translateY(-5px);
        }
        .dashboard-item h2 {
            color: #667eea;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
            text-transform: capitalize;
        }
        .dashboard-item img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
        .badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .no-images {
            text-align: center;
            padding: 50px;
            background: #f8f9fa;
            border-radius: 10px;
            grid-column: 1 / -1;
        }
        .no-images h2 {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Job Market Dashboard - Maroc</h1>
        <div style="text-align: center; margin-bottom: 30px;">
            <span class="badge">🕒 Mis à jour automatiquement</span>
        </div>
        
        <div class="dashboard-grid">
            <div class="dashboard-item">
                <h2>comparaison casablanca</h2>
                <img src="comparaison_casablanca.png" alt="comparaison casablanca">
            </div>
            <div class="dashboard-item">
                <h2>heatmap villes contrats</h2>
                <img src="heatmap_villes_contrats.png" alt="heatmap villes contrats">
            </div>
            <div class="dashboard-item">
                <h2>top 10 villes vertical</h2>
                <img src="top_10_villes_vertical.png" alt="top 10 villes vertical">
            </div>
            <div class="dashboard-item">
                <h2>top 15 villes</h2>
                <img src="top_15_villes.png" alt="top 15 villes">
            </div>
        </div>
        <div class="footer">
            <p>Généré automatiquement par GitHub Actions • Job Market Pipeline</p>
            <p><a href="https://github.com/ZainabElbouyed/job-market-pipeline" style="color: #667eea;">Voir le code source</a> | 
              <a href="https://github.com/ZainabElbouyed/job-market-pipeline/actions" style="color: #667eea;">Derniers runs</a></p>
            <p>📊 21/03/2026 00:07</p>
        </div>
    </div>
</body>
</html>
